const cats = ["すべて","頭部","肩・首","腕・手","腰・背中","足・脚","口腔・顔","神経・脳","内科・がん","婦人科","技術","その他"];
let activeCat = "すべて";

function renderFilters() {
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${activeCat===c?' active':''}" onclick="setcat('${c}')">${c}</button>`
  ).join('');
}

function setcat(c) { activeCat = c; render(); }

function render() {
  const q = document.getElementById('search').value.trim();
  const filtered = cases.filter(c => {
    const matchCat = activeCat === "すべて" || c.cat === activeCat;
    const matchQ = !q || c.name.includes(q) || c.cat.includes(q);
    return matchCat && matchQ;
  });
  renderFilters();
  document.getElementById('meta').textContent = filtered.length + ' 件';
  if (filtered.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="empty">該当する症例が見つかりませんでした</div>';
    return;
  }
  document.getElementById('grid').innerHTML = filtered.map(c =>
    `<a class="card" href="${c.url}" target="_blank" rel="noopener">
      <div class="card-name">${c.name}</div>
      <div class="card-tag">${c.cat}</div>
    </a>`
  ).join('');
}

render();
</script>
